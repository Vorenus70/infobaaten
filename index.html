<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>InfoBåten – Vannstand Osensjøen</title>
    <meta name="description" content="Sanntids vannstandhistorikk for Osensjøen. Data oppdateres daglig fra GLB.">
    <meta name="author" content="InfoBåten">
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>🚤 Osensjøen – Vannstandhistorikk</h1>
            <p>Oppdateres daglig automatisk | Data fra GLB</p>
        </div>

        <!-- Compact filter bar -->
        <div class="filter-bar">
            <div class="filter-left">
                <label for="yearSelect">Vis år:</label>
                <select id="yearSelect">
                    <option value="all">Alle år</option>
                </select>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="data-table" id="waterTable">
                <thead>
                    <tr>
                        <th class="col-timestamp hide-on-mobile">Tid</th>
                        <th class="col-date">Dato</th>
                        <th class="col-waterlevel">Vannstand (moh)</th>
                        <th class="col-change-raw">Endring m</th>
                        <th class="col-change-cm">Endring cm</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
