<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>InfoBåten – Vannstand Osensjøen</title>
    <meta name="description" content="Sanntids vannstandhistorikk for Osensjøen. Data oppdateres daglig fra GLB.">
    <meta name="author" content="InfoBåten">
    <link rel="icon" type="image/png" href="https://emojicdn.elk.sh/🚤">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script data-goatcounter="https://infobaaten.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
    <div class="site-wrapper">
        <div class="site-header">
            <h1>InfoBåten Vannstandhistorikk</h1>
        </div>

        <div class="dashboard-card">
            <div class="dashboard-header">
                <h2>🚤 Osensjøen – Vannstandhistorikk</h2>
                <p>Oppdateres daglig automatisk | Data fra GLB</p>
            </div>

            <div class="latest-card" id="latestCard">
                <div class="latest-header">
                    <span>📊 Siste måling</span>
                    <span class="latest-updated" id="latestUpdated">Laster...</span>
                </div>
                <div class="latest-content">
                    <div class="latest-value" id="latestValue">--.--</div>
                    <div class="latest-change" id="latestChange">
                        <span class="change-arrow"></span>
                        <span class="change-value"></span>
                    </div>
                </div>
            </div>

            <div class="filter-bar">
                <div class="filter-left">
                    <label for="yearSelect">Vis år:</label>
                    <select id="yearSelect">
                        <option value="all">Alle år</option>
                    </select>
                </div>
                <div class="action-buttons">
                    <button class="action-btn" id="refreshBtn" title="Oppdater data">
                        <svg class="action-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"/>
                            <path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
                            <path d="M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                    </button>
                    <button class="action-btn" id="exportBtn" title="Last ned CSV">
                        <svg class="action-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </button>
                    <button class="action-btn" id="graphBtn" title="Vis graf">
                        <svg class="action-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 20V10"/>
                            <path d="M12 20V4"/>
                            <path d="M6 20v-6"/>
                            <rect x="2" y="2" width="20" height="20" rx="2" ry="2"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="data-table" id="waterTable">
                    <thead>
                        <tr>
                            <th class="col-timestamp hide-on-mobile">Tid</th>
                            <th class="col-date">Dato</th>
                            <th class="col-waterlevel">Vannstand (moh)</th>
                            <th class="col-change-raw">Endring m</th>
                            <th class="col-change-cm">Endring cm</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="dashboard-footer">
                <div class="footer-content">
                    <a href="https://www.facebook.com/infobaaten" target="_blank" rel="noopener noreferrer" class="facebook-btn">
                        <span>👍</span> Like på Facebook
                    </a>
                    <div class="footer-copyright">
                        © 2026 InfoBåten
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Graph Modal -->
    <div id="graphModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">📊 Vannstandsendring (cm)</span>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <canvas id="graphCanvas"></canvas>
                <div class="modal-note">Grønne søyler = stigning | Røde søyler = fall</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
